name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: npm
      - run: npm ci
      - run: npm test
        env:
          CI: true
      - run: npm run build
        env:
          CI: true
      # Gate on what actually ships; dev-tooling advisories don't reach users.
      - run: npm audit --omit=dev --audit-level=high
